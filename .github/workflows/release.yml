name: Release

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Test and vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: true

      - name: Resolve release tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0 or v0.1.0-rc.1, got: $tag" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/release

          while read -r goos goarch; do
            [ -n "$goos" ] || continue

            name="r2sync_${RELEASE_TAG}_${goos}_${goarch}"
            outdir="dist/${name}"
            mkdir -p "$outdir"

            bin="r2sync"
            if [ "$goos" = "windows" ]; then
              bin="r2sync.exe"
            fi

            echo "Building ${name}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath \
              -ldflags="-s -w -X r2sync/internal/buildinfo.Version=${RELEASE_TAG}" \
              -o "${outdir}/${bin}" ./cmd/r2sync

            if [ "$goos" = "windows" ]; then
              (cd "$outdir" && zip -9 "../release/${name}.zip" "$bin")
            else
              tar -C "$outdir" -czf "dist/release/${name}.tar.gz" "$bin"
            fi
          done <<'TARGETS'
          linux amd64
          linux arm64
          darwin amd64
          darwin arm64
          windows amd64
          windows arm64
          TARGETS

          (cd dist/release && sha256sum * > SHA256SUMS)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: r2sync-${{ env.RELEASE_TAG }}
          path: dist/release/*
          if-no-files-found: error

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/release/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/release/* \
              --target "$GITHUB_SHA" \
              --title "r2sync ${RELEASE_TAG}" \
              --notes "Automated r2sync release for ${RELEASE_TAG}."
          fi
